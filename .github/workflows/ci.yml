name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        env:
          BUILD_ONLY: "1"

      - name: Build
        run: npm run build
        env:
          BUILD_ONLY: "1"
          NODE_ENV: production

  smoke:
    runs-on: ubuntu-latest
    needs: lint-and-build
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Start server
        run: npm run start &
        env:
          NODE_ENV: production
          MONGODB_URI: mongodb://localhost:27017/sanshou_ci
          NEXTAUTH_SECRET: ci-secret-min-32-chars-long
          NEXTAUTH_URL: http://localhost:3000

      - name: Wait for liveness
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health/live >/dev/null; then
              echo "Server is up"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Server did not become ready"
              exit 1
            fi
            sleep 2
          done

      - name: Run smoke tests
        run: npm run smoke
        env:
          SMOKE_BASE_URL: http://localhost:3000
          SMOKE_TIMEOUT_MS: 10000
